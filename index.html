<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مُنقذ | استعلام عن شهادة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F9F9F9; margin: 0; padding: 0; }
        .header { padding: 1.5rem; border-bottom: 1px solid #e0e0e0; background-color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .logo-area { display: flex; align-items: center; gap: 0.75rem; }
        .card { background-color: #fff; border-radius: 1.25rem; padding: 1.5rem; margin: 1.5rem auto; max-width: 800px; box-shadow: 0px 12px 23px rgba(63, 154, 224, 0.04); text-align: center; }
        .icon-circle { width: 54px; height: 54px; border-radius: 14px; background-color: #14afd0; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-top: 2rem; }
        h2 { margin: 0 0 0.5rem; font-size: 1.5rem; color: #000; }
        span { font-size: 0.875rem; color: #7e7e7e; }
        img { width: 52px; height: auto; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <img src="images (25).jpeg" alt="Logo">
            <h3 style="margin: 0; color: #3d4465;">منصة مُنقذ</h3>
        </div>
    </div>

    <div class="card">
        <h5 style="text-align: right; margin-bottom: 2rem;">معلومات الشهادة</h5>
        
        <div class="icon-circle"><i class="fa fa-user" style="font-size: 30px; color: #fff;"></i></div>
        <h2>Ahmed Rizk Mohamed Abdelrazek</h2>
        <span>الإسم</span>

        <div class="grid">
            <div>
                <div class="icon-circle"><i class="fa fa-certificate" style="font-size: 30px; color: #fff;"></i></div>
                <h2>KSA-26-0378</h2>
                <span>رقم الشهادة</span>
            </div>
            <div>
                <div class="icon-circle"><i class="fa fa-list" style="font-size: 30px; color: #fff;"></i></div>
                <h2>شهادة إنقاذ</h2>
                <span>إسم الشهادة</span>
            </div>
        </div>

        <div class="grid">
            <div>
                <div class="icon-circle"><i class="fa fa-clock-o" style="font-size: 30px; color: #fff;"></i></div>
                <h2>2026-05-08</h2>
                <span>تاريخ الإصدار</span>
            </div>
            <div>
                <div class="icon-circle"><i class="fa fa-clock-o" style="font-size: 30px; color: #fff;"></i></div>
                <h2>2028-05-08</h2>
                <span>تاريخ إنتهاء الصلاحية</span>
            </div>
        </div>
    </div>

</body>
</html>
